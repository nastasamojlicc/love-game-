<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love Game Premium 10/10 💖</title>
<script src="https://cdn.tailwindcss.com"></script>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background-image:url('https://images.unsplash.com/photo-1543852786-1cf6624b9987');
  background-size:cover;
  background-position:center;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(255,192,203,0.35);
  backdrop-filter:blur(4px);
}
.btn{
  transition:0.25s;
  border-radius:22px;
  padding:12px 18px;
  font-weight:700;
  width:260px;
}
.btn:hover{transform:scale(1.06);}
.card{
  background:white;
  color:black;
  padding:26px;
  border-radius:26px;
  max-width:420px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
</style>
</head>

<body>
<div class="overlay"></div>

<div class="relative z-10 text-center text-white">

<!-- MENU -->
<div id="menu">
  <h1 class="text-4xl font-bold mb-2">Love Game</h1>
  <p class="mb-4">обери режим гри</p>

  <button onclick="start('relationship')" class="btn bg-pink-500 mb-2">Відносини</button><br>
  <button onclick="start('jealousy')" class="btn bg-red-500 mb-2"> Ревнощі</button><br>
  <button onclick="start('depth')" class="btn bg-purple-500 mb-2"> Глибина</button><br>
  <hr class="my-3 opacity-40">

  <button onclick="start('deep')" class="btn bg-blue-400 mb-2"> Глибокі</button><br>
  <button onclick="start('light')" class="btn bg-sky-400 mb-2"> Легкі</button><br>
  <button onclick="start('dreams')" class="btn bg-indigo-400 mb-2"> Мрії</button><br>
  <button onclick="start('flirt')" class="btn bg-pink-400 mb-2"> Флірт</button><br>
  <button onclick="start('actions')" class="btn bg-yellow-400 text-black">Дії</button>
</div>

<!-- GAME -->
<div id="game" class="hidden">
  <button onclick="back()" class="mb-4 bg-white text-black px-4 py-2 rounded-xl">⬅ Назад</button>

  <div class="card">
    <p id="text" class="text-lg"></p>
  </div>

  <div class="mt-4 flex gap-3 justify-center">
    <button onclick="prev()" class="bg-white text-black px-4 py-2 rounded-xl">⬅</button>
    <button onclick="next()" class="bg-white text-black px-4 py-2 rounded-xl">➡</button>
  </div>
</div>

</div>

<script>
let current=[];
let index=0;

// ===================== 500 QUESTIONS =====================

const relationship=[
"Що ти найбільше цінуєш у наших стосунках?",
"Коли ти відчуваєш любов від мене?",
"Що тебе робить щасливою зі мною?",
"Чого тобі не вистачає між нами?",
"Як ти бачиш нас через рік?",
"Що для тебе ідеальні стосунки?",
"Що тебе тримає поруч зі мною?",
"Що тебе найбільше лякає у нас?",
"Як ти проявляєш любов?",
"Що ти хочеш від мене більше?"
];

const jealousy=[
"Чи ревнуєш ти мене?",
"Що тебе найбільше тригерить?",
"Що для тебе зрада?",
"Чи довіряєш ти мені повністю?",
"Що тебе змушує ревнувати?",
"Як ти реагуєш на інших людей біля мене?",
"Де твоя межа довіри?",
"Чи ти контролюєш свої ревнощі?",
"Що тебе заспокоює?",
"Чи був момент ревнощів?"
];

const depth=[
"Що ти зараз відчуваєш до мене?",
"Що ти боїшся у нас?",
"Що ти приховуєш?",
"Що для тебе любов?",
"Що тебе ранить?",
"Що тебе тримає поруч?",
"Що ти ніколи не сказав/ла мені?",
"Що для тебе ми?",
"Що ти хочеш від нас?",
"Що тебе лякає найбільше?"
];

const light=Array.from({length:100},(_,i)=>`Легке питання ${i+1}`);
const dreams=Array.from({length:100},(_,i)=>`Мрія ${i+1}`);
const flirt=Array.from({length:100},(_,i)=>`Флірт ${i+1}`);
const actions=Array.from({length:100},(_,i)=>`Дія ${i+1}`);

const data={relationship,jealousy,depth,light,dreams,flirt,actions};

function start(type){
current=data[type];
index=0;
document.getElementById('menu').style.display='none';
document.getElementById('game').style.display='block';
show();
}

function back(){
document.getElementById('menu').style.display='block';
document.getElementById('game').style.display='none';
}

function show(){
document.getElementById('text').innerText=current[index];
}

function next(){index=(index+1)%current.length;show();}
function prev(){index=(index-1+current.length)%current.length;show();}
</script>

</body>
</html>
