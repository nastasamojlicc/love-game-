const data={deep,light,dreams,flirt,actions};

function start(type){current=data[type];index=0;menu.style.display='none';game.style.display='block';show();}
function back(){menu.style.display='block';game.style.display='none';}
function show(){text.innerText=current[index];}
function next(){index=(index+1)%current.length;show();}
function prev(){index=(index-1+current.length)%current.length;show();}

let startX=0;
document.addEventListener('touchstart',e=>startX=e.touches[0].clientX);
document.addEventListener('touchend',e=>{
 let endX=e.changedTouches[0].clientX;
 if(endX-startX>50) prev();
 if(startX-endX>50) next();
});
